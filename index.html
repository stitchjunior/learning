<!DOCTYPE html>
<html lang="en">
<head>

<style>
  :root{
    --main:#00ff88;
    --main2:#7dffd0;
    --bg:#030303;
    --panel:rgba(0,0,0,.72);
    --panel2:rgba(0,0,0,.9);
    --text:#eafff4;
    --muted:#9ff5cb;
    --danger:#ff4d6d;
    --accent:#00ff88;
    --accent2:#7dffd0;

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
  }

  body{
    font-family:Arial, Helvetica, sans-serif;
    color:var(--text);
    cursor:none;
    background:
      radial-gradient(circle at 20% 20%, rgba(0,255,136,.10), transparent 28%),
      radial-gradient(circle at 80% 18%, rgba(0,255,136,.07), transparent 24%),
      linear-gradient(180deg,#010101,#050505 50%,#000 100%);
    transition:
      background 800ms ease,
      filter 200ms ease,
      transform 120ms ease,
      color 400ms ease;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-4;
    background:
      radial-gradient(circle at 30% 35%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 35%),
      radial-gradient(circle at 75% 70%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 32%);
    animation:bgPulse 8s ease-in-out infinite alternate;
    transition:background 600ms ease;
  }

  @keyframes bgPulse{
    from{transform:scale(1)}
    to{transform:scale(1.12)}
  }

  #wallpaper{
    position:fixed;
    inset:0;
    z-index:-5;
    opacity:.12;
    background:
      linear-gradient(90deg, transparent 0 96%, color-mix(in srgb, var(--accent) 6%, transparent) 96%),

    transition:background 600ms ease, opacity 300ms ease;

  @keyframes gridMove{
    from{transform:translate(0,0)}
    to{transform:translate(-70px,-70px)}
  }

  canvas#bg{
    position:fixed;
    inset:0;
    z-index:-3;
    width:100%;
    height:100%;
  }

    inset:0;
    pointer-events:none;

let cx=window.innerWidth/2;
let cy=window.innerHeight/2;
let tx=cx;
let ty=cy;
let cursorTick = 0;

document.addEventListener("mousemove", e=>{
  tx = e.clientX;
  ty = e.clientY;
});

function addCursorTrail(x,y){
  const t = document.createElement("div");
  t.className = "trail";
  t.style.left = x + "px";
  t.style.top = y + "px";
  t.style.background = `color-mix(in srgb, var(--accent) 85%, white)`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 300);
}

function animateCursor(){
  cx += (tx - cx) * 0.22;
  cy += (ty - cy) * 0.22;
  cursor.style.left = cx + "px";
  cursor.style.top = cy + "px";
  cursorDot.style.left = tx + "px";
  cursorDot.style.top = ty + "px";

  cursorTick++;
  if(cursorTick % 3 === 0){
    addCursorTrail(tx, ty);
  }

  requestAnimationFrame(animateCursor);
}
animateCursor();

document.addEventListener("mousedown", ()=>{
  cursor.classList.add("cursor-click");
});
document.addEventListener("mouseup", ()=>{
  cursor.classList.remove("cursor-click");
});

function attachHoverCursor(root=document){
  root.querySelectorAll("button, input, .card, .icon, .taskApp, .startItem, .smallBtn, .ghostBtn, .switchBtn").forEach(el=>{
    el.addEventListener("mouseenter", ()=>{
      cursor.classList.add("cursor-hover");

    });
    el.addEventListener("mouseleave", ()=>{
      cursor.classList.remove("cursor-hover");
    });
  });
}

let dots = [];

function resizeBg(){
  bgCanvas.width = innerWidth;
  bgCanvas.height = innerHeight;
}
window.addEventListener("resize", resizeBg);
resizeBg();

function initDots(){
  dots = [];
  for(let i=0;i<110;i++){
    dots.push({
      x:Math.random()*bgCanvas.width,
      y:Math.random()*bgCanvas.height,
      vx:(Math.random()-.5)*.34,
      vy:(Math.random()-.5)*.34,
      size:Math.random()*1.8+.8
    });
  }
}
initDots();

function drawBg(){
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  bgCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent").trim() || "#00ff88";

  for(const d of dots){
    d.x += d.vx;
    d.y += d.vy;
    if(d.x < 0 || d.x > bgCanvas.width) d.vx *= -1;
    if(d.y < 0 || d.y > bgCanvas.height) d.vy *= -1;
    bgCtx.fillRect(d.x, d.y, d.size, d.size);
  }

  requestAnimationFrame(drawBg);
}
drawBg();

function runBoot(){

  function type(){
    if(li >= bootLines.length) return;
    const line = bootLines[li];

    if(ci < line.length){
      terminal.textContent += line[ci];
      ci++;
      setTimeout(type, 18);
    }else{
      terminal.textContent += "\n";
      li++;
      ci=0;
      setTimeout(type, 110);

  }

  type();

  let p=0;

    p += 2;
    bar.style.width = p + "%";

    if(p >= 100){
      clearInterval(loader);
      terminal.textContent += "\n> ACCESS GRANTED";
      setTimeout(()=>{
        boot.style.opacity = "0";
        boot.style.transition = "opacity .35s ease";

      }, 380);

}

function createCard(game){
  const c = document.createElement("div");
  c.className = "card";

  c.innerHTML = `
    <img src="${game.img || ""}" alt="${game.name}" loading="lazy" onerror="this.src='';this.style.background='#0a0a0a'">
    <div class="cardContent">
      <div class="cardTopRow">
        <span class="badge">${game.category || "custom"}</span>
        <span class="badge playBadge">PLAY</span>
      </div>
      <div class="cardName">${game.name}</div>
      <div class="cardMeta">
        <span>manual local file</span>
        <span>html</span>
      </div>
    </div>
  `;

  c.addEventListener("mousemove", e=>{
    const rect = c.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    c.style.background = `radial-gradient(circle at ${x}px ${y}px, color-mix(in srgb, var(--accent) 16%, transparent), #000 60%)`;
  });

  c.addEventListener("mouseleave", ()=>{
    c.style.background = "#000";
  });

  c.addEventListener("click", ()=>{
    openGame(game.file, game.name);
  });

  return c;
}

function renderGames(list){
  grid.innerHTML = "";
  list.forEach(g=>grid.appendChild(createCard(g)));
  gameCount.textContent = list.length;
  attachHoverCursor(grid);
}

function filterGames(v){
  const value = v.trim().toLowerCase();
  if(!value){
    renderGames(games);
    renderStartMenu();
    return;
  }

  const filtered = games.filter(g =>
    g.name.toLowerCase().includes(value) ||
    (g.category || "").toLowerCase().includes(value)
  );

  renderGames(filtered);
  renderStartMenu(value);
}

});

function openGame(url, name="game"){
  soundUIOpen();

  player.classList.remove("active");
  frame.src = "";

  fetch(url, {method:"HEAD"})
    .then(res=>{
      if(!res.ok){
        aiSay("game missing or broken: " + url);
        return;
      }

      setTimeout(()=>{
        frame.src = url;
        player.classList.add("active");
      }, 100);

      registerGameOpen(name);
      addTaskApp(`🎮 ${name}`, ()=>openGame(url, name));
      aiReact("game");
      if(gameStats[name] >= 3){
        aiSay(`you really like ${name}.`);
      }
    })
    .catch(()=>{
      aiSay("error loading game");
    });
}

function closeGame(){
  player.classList.remove("active");
  setTimeout(()=>{
    frame.src = "";
  },180);
  aiReact("close");
}

function getRecommendedGame(){
  const entries = Object.entries(gameStats);
  if(!entries.length) return games[0] || null;
  entries.sort((a,b)=>b[1]-a[1]);
  const found = games.find(g=>g.name === entries[0][0]);
  return found || games[0] || null;

function renderStartMenu(query=""){
  startBody.innerHTML = "";
  const q = query.toLowerCase();

  const appSection = document.createElement("div");
  appSection.className = "startSectionTitle";
  appSection.textContent = "apps";
  startBody.appendChild(appSection);

  const apps = [
    {name:"Settings", desc:"themes, wallpaper, ai mode", action:openSettings},
    {name:"Profile", desc:"username and info", action:openProfile},
    {name:"Submit Game", desc:"add custom games", action:openSubmitGame},
    {name:"Recommended", desc:getRecommendedGame() ? `play ${getRecommendedGame().name}` : "nothing yet", action:()=> {
      const rec = getRecommendedGame();
      if(rec) openGame(rec.file, rec.name);
    }}
  ].filter(a => !q || a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q));

  apps.forEach(a=>{
    const b = document.createElement("button");
    b.className = "startItem";
    b.innerHTML = `${a.name}<small>${a.desc}</small>`;
    b.addEventListener("click", ()=>{
      a.action();
      startMenu.style.display = "none";
    });
    startBody.appendChild(b);
  });

  const gameSection = document.createElement("div");
  gameSection.className = "startSectionTitle";
  gameSection.textContent = "games";
  startBody.appendChild(gameSection);

  games
    .filter(g => !q || g.name.toLowerCase().includes(q) || (g.category || "").toLowerCase().includes(q))
    .forEach(g=>{
      const b = document.createElement("button");
      b.className = "startItem";
      b.innerHTML = `${g.name}<small>${g.category || "custom"}</small>`;
      b.addEventListener("click", ()=>{
        openGame(g.file, g.name);
        startMenu.style.display = "none";
      });
      startBody.appendChild(b);
    });

  attachHoverCursor(startBody);
}

function focusWindow(win){
  taskZ++;
  win.style.zIndex = taskZ;
}

function makeWindowDraggable(win, bar){
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  bar.addEventListener("mousedown", e=>{
    dragging = true;
    focusWindow(win);
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
  });

  document.addEventListener("mousemove", e=>{
    if(!dragging) return;
    win.style.left = clamp(e.clientX - offsetX, 8, window.innerWidth - win.offsetWidth - 8) + "px";
    win.style.top = clamp(e.clientY - offsetY, 8, window.innerHeight - win.offsetHeight - 64) + "px";
  });

  document.addEventListener("mouseup", ()=>{
    dragging = false;
  });
}

function openWindow(title, html){
  const win = document.createElement("div");
  win.className = "window";
  win.style.left = Math.round(90 + Math.random()*120) + "px";
  win.style.top = Math.round(110 + Math.random()*80) + "px";
  win.style.zIndex = ++taskZ;

  win.innerHTML = `
    <div class="titleBar">
      <div class="titleBarText">${title}</div>
      <div class="titleBarActions">
        <button class="winBtn" data-min>—</button>
        <button class="winBtn" data-close>✕</button>
      </div>
    </div>
    <div class="winBody">${html}</div>
  `;

  windowLayer.appendChild(win);

  const titleBar = win.querySelector(".titleBar");
  const btnClose = win.querySelector("[data-close]");
  const btnMin = win.querySelector("[data-min]");

  makeWindowDraggable(win, titleBar);

  btnClose.addEventListener("click", ()=>win.remove());

  btnMin.addEventListener("click", ()=>{
    win.style.display = "none";
    const task = addTaskApp(title, ()=>{
      win.style.display = "flex";
      focusWindow(win);
      task.remove();
    });
  });

  win.addEventListener("mousedown", ()=>focusWindow(win));
  attachHoverCursor(win);
  return win;
}

function makeDraggableIcon(el){
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener("mousedown", e=>{
    dragging = true;
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;
  });

  document.addEventListener("mousemove", e=>{

    el.style.left = clamp(e.clientX - offsetX, 6, window.innerWidth - el.offsetWidth - 6) + "px";
    el.style.top = clamp(e.clientY - offsetY, 86, window.innerHeight - el.offsetHeight - 62) + "px";
  });

  document.addEventListener("mouseup", ()=>{
    dragging = false;
  });

  el.addEventListener("dblclick", ()=>{
    if(typeof el._openAction === "function") el._openAction();
  });
}

function aiThink(){
  aiSay(aiRandomLines[Math.floor(Math.random()*aiRandomLines.length)]);

function aiReact(event){
  if(event === "idle"){
    aiSay("you stopped moving...");
    return;
  }
  if(event === "game"){
    aiSay("finally doing something.");
    return;
  }
  if(event === "close"){
    aiSay("already leaving?");
    return;
  }
  if(event === "spam"){
    aiSay("you clicking too fast.");
    return;
  }
  if(event === "win"){
    const line = aiMode === "toxic" ? "about time you won." : "nice win.";
    aiSay(line);
    return;
  }
  if(event === "lose"){
    const line = aiMode === "toxic" ? "that blocker cooked you." : "rough round.";
    aiSay(line);
    return;
  }
  if(event === "combo"){
    aiSay("combo climbing.");
  }
}

function aiReply(input){
  input = input.toLowerCase();

  if(input === "toxic mode"){
    aiMode = "toxic";
    localStorage.setItem("subussy_ai_mode", aiMode);
    aiSay("toxic mode enabled.");
    return;
  }

  if(input === "helper mode"){
    aiMode = "helper";
    localStorage.setItem("subussy_ai_mode", aiMode);
    aiSay("helper mode enabled.");
    return;
  }

  if(input === "normal mode"){
    aiMode = "normal";
    localStorage.setItem("subussy_ai_mode", aiMode);
    aiSay("normal mode.");
    return;
  }

  if(input.includes("play ")){
    const name = input.replace("play ","").trim();
    const found = games.find(g=>g.name.toLowerCase().includes(name));
    if(found){
      openGame(found.file, found.name);
      aiSay(found.name + " launched.");
      return;
    }
  }

  if(input.includes("close game")){
    closeGame();
    aiSay("closing...");
    return;
  }

  if(input.includes("settings")){
    openSettings();
    aiSay("opening settings...");
    return;
  }

  if(input.includes("search")){
    const word = input.replace("search","").trim();
    search.value = word;
    filterGames(word);
    aiSay("searching " + word);
    return;
  }

  if(input === "submit"){
    openSubmitGame();
    aiSay("open submit window.");
    return;
  }

  if(input === "glitch"){
    aiSay("injecting glitch...");
    body.classList.add("glitch");
    setTimeout(()=>body.classList.remove("glitch"), 1000);
    return;
  }

  if(input === "help"){
    aiSay("commands: play <game>, search <word>, settings, close game, submit, helper mode, toxic mode, normal mode, glitch");
    return;
  }

  if(aiMode === "toxic"){
    const toxic = [
      "that was dumb.",
      "you serious?",
      "do something useful.",
      "this is why you lose.",
      "you just typing random stuff now."
    ];
    aiSay(toxic[Math.floor(Math.random()*toxic.length)]);
    return;
  }

  if(aiMode === "helper"){
    const helper = [
      "try typing 'play sonic'.",
      "you can search for games.",
      "open submit to add a new game.",
      "open settings to customize."
    ];
    aiSay(helper[Math.floor(Math.random()*helper.length)]);
    return;
  }

  const normal = [
    "unknown command.",
    "try again.",
    "does nothing.",
    "invalid input."
  ];
  aiSay(normal[Math.floor(Math.random()*normal.length)]);
}

aiInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    const val = aiInput.value.trim();
    if(!val) return;
    aiSay(val);
    aiReply(val);
    aiInput.value = "";
  }
});

setInterval(()=>{
  if(Math.random() > 0.6){
    aiThink();
  }
},10000);

/* spam detect */
document.addEventListener("click", ()=>{
  clickCount++;

  if(clickCount > 10){
    aiReact("spam");
    clickCount = 0;
  }
  setTimeout(()=>clickCount = 0, 2000);
});

/* =========================
   IDLE
========================= */
function resetIdle(){
  idleTime = 0;
  idleBox.style.display = "none";
}

["mousemove","click","keydown"].forEach(e=>{
  document.addEventListener(e, resetIdle);
});

setInterval(()=>{
  idleTime++;

  if(idleTime === 5){
    idleBox.style.display = "block";
    idleCharacter.textContent = ["🤖","😈","👾","🧠","💀"][Math.floor(Math.random()*5)];
    idleText.textContent = aiIdleMessages[Math.floor(Math.random()*aiIdleMessages.length)];
    aiReact("idle");
  }

  if(idleTime === 10){
    idleText.textContent = "still nothing??? 💀";
  }

  if(idleTime === 15){
    idleText.textContent = "ok now you're just wasting time";
  }
},1000);

/* =========================
   FIGHT HELPERS
========================= */
function setFightBars(){
  hp1Bar.style.width = clamp(hp1,0,100) + "%";
  hp2Bar.style.width = clamp(hp2,0,100) + "%";
}

function setFace(face, state){
  if(state === "idle") face.textContent = "• •";
  if(state === "hit") face.textContent = "x x";
  if(state === "attack") face.textContent = "> <";
  if(state === "kick") face.textContent = "^ <";
  if(state === "win") face.textContent = "⌐■";
  if(state === "angry") face.textContent = "› ‹";
}

function flashHitEffect(){
  const flash = document.createElement("div");
  flash.className = "screenFlash";
  document.body.appendChild(flash);
  flash.style.opacity = "0.95";
  setTimeout(()=>flash.style.background = "#000", 160);
  setTimeout(()=>flash.style.opacity = "0", 520);
  setTimeout(()=>flash.remove(), 820);
}

function shakeScreen(power=10, duration=220){
  document.body.style.animation = `screenShake ${duration}ms linear`;
  setTimeout(()=>body.style.animation = "", duration);
}

function freezeHit(){
  body.classList.add("hitFreeze");
  setTimeout(()=>body.classList.remove("hitFreeze"), 90);
}

function spawnSpark(target){
  const rect = target.getBoundingClientRect();
  const spark = document.createElement("div");
  spark.className = "hitSpark";
  spark.style.left = rect.left + rect.width/2 - 9 + "px";
  spark.style.top = rect.top + rect.height/2 - 9 + "px";
  document.body.appendChild(spark);
  setTimeout(()=>spark.remove(), 240);
}

function showComboGlow(el){
  el.classList.add("comboGlow");
  setTimeout(()=>el.classList.remove("comboGlow"), 450);
}

function dashAttack(attacker){
  if(attacker === 1){
    fighter1.classList.add("dash");
  }else{
    fighter2.classList.add("dash");
  }

  setTimeout(()=>{
    fighter1.classList.remove("dash");
    fighter2.classList.remove("dash");
  }, 130);
}

function animatePunch(attacker){
  if(attacker === 1){
    fighter1.classList.add("attack");
    fighter1Fist.classList.add("active");
    setFace(face1,"attack");
  }else{
    fighter2.classList.add("attack");
    fighter2Fist.classList.add("active");
    setFace(face2,"attack");
  }

  setTimeout(()=>{
    fighter1.classList.remove("attack");
    fighter2.classList.remove("attack");
    fighter1Fist.classList.remove("active");
    fighter2Fist.classList.remove("active");
  }, 130);
}

function animateKick(attacker){
  if(attacker === 1){
    fighter1.classList.add("kick");
    fighter1Kick.classList.add("active");
    setFace(face1,"kick");
  }else{
    fighter2.classList.add("kick");
    fighter2Kick.classList.add("active");
    setFace(face2,"kick");
  }

  setTimeout(()=>{
    fighter1.classList.remove("kick");
    fighter2.classList.remove("kick");
    fighter1Kick.classList.remove("active");
    fighter2Kick.classList.remove("active");
  }, 180);
}

function markHit(target, whichFace){
  target.classList.add("hit");
  setFace(whichFace, "hit");
  setTimeout(()=>{
    target.classList.remove("hit");
  }, 130);
}

function markBlock(target){
  target.classList.add("block");
  setTimeout(()=>{
    target.classList.remove("block");
  }, 110);
}

function markClash(){
  fighter1.classList.add("clash");
  fighter2.classList.add("clash");
  setTimeout(()=>{
    fighter1.classList.remove("clash");
    fighter2.classList.remove("clash");
  }, 120);
}

function attackSequence(attacker, type, dmg, comboCount){
  const isYou = attacker === 1;
  const target = isYou ? fighter2 : fighter1;
  const targetFace = isYou ? face2 : face1;

  dashAttack(attacker);

  if(type === "kick"){
    soundKick();
    animateKick(attacker);
  }else{
    soundWhoosh();
    animatePunch(attacker);
  }

  setTimeout(()=>{
    if(type === "kick"){
      soundHitA();
      shakeScreen(14, 260);
    }else{
      isYou ? soundHitA() : soundHitB();
      shakeScreen(10, 220);
    }

    flashHitEffect();
    freezeHit();
    markHit(target, targetFace);
    spawnSpark(target);

    if(comboCount >= 5){
      showComboGlow(isYou ? fighter1 : fighter2);
      aiReact("combo");
    }

    if(type === "kick"){
      fightText.textContent = comboCount >= 3 ? `COMBO x${comboCount} // KICK ${dmg}` : `KICK ${dmg}`;
      showDialog(kickDialogs[Math.floor(Math.random()*kickDialogs.length)]);
    }else{
      fightText.textContent = comboCount >= 3 ? `COMBO x${comboCount} // ${dmg}` : `${dmg} DAMAGE`;
      showDialog(attackDialogs[Math.floor(Math.random()*attackDialogs.length)]);
    }

    setTimeout(()=>{
      setFace(face1, "idle");
      setFace(face2, "idle");
    }, 180);
  }, 80);
}

/* =========================
   FIGHT SYSTEM
========================= */
function startFight(){
  hp1 = 100;
  hp2 = 100;
  combo1 = 0;
  combo2 = 0;
  fightOver = false;
  enemyName = enemyPool[Math.floor(Math.random()*enemyPool.length)];
  updateFightNames();
  setFightBars();
  setFace(face1, "idle");
  setFace(face2, "idle");
  fightText.textContent = "FIGHT START";
  setTimeout(()=>showDialog("you really thought this blocker would win?", 1200), 500);

  currentFightLoop = setInterval(()=>{
    doFightAction();
  }, 580);
}

function doFightAction(){
  if(fightOver) return;

  if((hp2 <= 18 || hp1 <= 18) && Math.random() < 0.22){
    doUltimateMove();
    return;
  }

  const roll = Math.random();

  if(roll < 0.42){
    const attacker = Math.random() > 0.35 ? 1 : 2;
    const base = Math.floor(Math.random()*6)+6;

    if(attacker === 1){
      combo1++;
      combo2 = 0;
      const dmg = base + combo1;
      hp2 -= dmg;
      attackSequence(1, "punch", dmg, combo1);
    } else {
      combo2++;
      combo1 = 0;
      const dmg = base + combo2;
      hp1 -= dmg;
      attackSequence(2, "punch", dmg, combo2);
    }
  } else if(roll < 0.68){
    const attacker = Math.random() > 0.45 ? 1 : 2;
    const base = Math.floor(Math.random()*7)+8;

    if(attacker === 1){
      combo1++;
      combo2 = 0;
      const dmg = base + combo1;
      hp2 -= dmg;
      attackSequence(1, "kick", dmg, combo1);
    } else {
      combo2++;
      combo1 = 0;
      const dmg = base + combo2;
      hp1 -= dmg;
      attackSequence(2, "kick", dmg, combo2);
    }
  } else if(roll < 0.84){
    const defender = Math.random() > 0.5 ? fighter1 : fighter2;
    markBlock(defender);
    soundBlock();
    fightText.textContent = "BLOCKED";
    showDialog("DEFENSE ACTIVE");
  } else {
    markClash();
    soundClash();
    fightText.textContent = "CLASH ⚡";
    showDialog("POWER STRUGGLE...");
    flashHitEffect();
    shakeScreen(8, 180);
  }

  setFightBars();
  checkFightEnd();
}

function doUltimateMove(){
  const move = [
    {text:"OVERLOAD STRIKE", dialog:"GGs stupid blocker."},
    {text:"DATA WIPE", dialog:"deleted."},
    {text:"SYSTEM BREAK", dialog:"you were never a challenge."},
    {text:"FINAL EXECUTION", dialog:"too easy."}
  ][Math.floor(Math.random()*4)];

  currentFightLoop && clearInterval(currentFightLoop);

  fightText.textContent = "ULTIMATE READY";
  showDialog("FINAL SEQUENCE");

  setTimeout(()=>{
    fightText.textContent = move.text;
    showDialog(move.dialog, 1800);
    soundFinisher();
    flashHitEffect();
    shakeScreen(18, 480);

    fighter1.classList.add("dash");
    fighter2.classList.add("hit");
    setFace(face1, "angry");
    setFace(face2, "hit");

    setTimeout(()=>{
      fighter1.classList.remove("dash");
      fighter2.classList.remove("hit");
      hp2 = 0;
      setFightBars();
      checkFightEnd();
    }, 550);
  }, 400);
}

function checkFightEnd(){
  if(hp1 <= 0 || hp2 <= 0){
    fightOver = true;
    currentFightLoop && clearInterval(currentFightLoop);

    const userWins = hp2 <= 0 && hp1 > hp2;

    if(userWins){
      totalWins++;
      setFace(face1, "win");
      setFace(face2, "hit");
      fightText.textContent = username + " WINS";
      showDialog(winDialogs[Math.floor(Math.random()*winDialogs.length)], 1300);
      aiReact("win");
    } else {
      totalLosses++;
      setFace(face2, "win");
      setFace(face1, "hit");
      fightText.textContent = enemyName + " WINS";
      showDialog(loseDialogs[Math.floor(Math.random()*loseDialogs.length)], 1300);
      aiReact("lose");
    }

    saveStats();

    setTimeout(()=>{
      fightScene.style.opacity = "0";
      setTimeout(()=>{
        if(fightScene.parentNode) fightScene.remove();
      }, 460);
    }, 1500);
  }
}

/* =========================
   KEYS
========================= */
document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase() === "u") changeUser();
  if(e.key.toLowerCase() === "s") openSettings();
  if(e.key.toLowerCase() === "n") openSubmitGame();
  if(e.key === "Escape" && player.classList.contains("active")) closeGame();
});

/* =========================
   INIT
========================= */
setTheme(currentTheme);
setWallpaper(currentWallpaper);
updateFightNames();
setFightBars();
attachHoverCursor(document);
aiSay("system online.");
startFight();
</script>
