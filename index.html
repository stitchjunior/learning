<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ultimate-subussy</title>
<style>
  :root{
    --main:#00ff88;
    --main2:#7dffd0;
    --bg:#030303;
    --panel:rgba(0,0,0,.72);
    --panel2:rgba(0,0,0,.9);
    --text:#eafff4;
    --muted:#9ff5cb;
    --danger:#ff4d6d;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
  }

  body{
    font-family:Arial, Helvetica, sans-serif;
    color:var(--text);
    cursor:none;
    background:
      radial-gradient(circle at 20% 20%, rgba(0,255,136,.10), transparent 28%),
      radial-gradient(circle at 80% 18%, rgba(0,255,136,.07), transparent 24%),
      linear-gradient(180deg,#010101,#050505 50%,#000 100%);
  }

  /* animated glow layer */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-4;
    background:
      radial-gradient(circle at 30% 35%, rgba(0,255,136,.10), transparent 35%),
      radial-gradient(circle at 75% 70%, rgba(0,255,136,.08), transparent 32%);
    animation:bgPulse 8s ease-in-out infinite alternate;
  }

  @keyframes bgPulse{
    from{transform:scale(1)}
    to{transform:scale(1.12)}
  }

  #wallpaper{
    position:fixed;
    inset:0;
    z-index:-5;
    opacity:.12;
    background:
      linear-gradient(90deg, transparent 0 96%, rgba(0,255,136,.06) 96%),
      linear-gradient(transparent 0 96%, rgba(0,255,136,.06) 96%);
    background-size:70px 70px;
    animation:gridMove 7s linear infinite;
  }

  @keyframes gridMove{
    from{transform:translate(0,0)}
    to{transform:translate(-70px,-70px)}
  }

  canvas#bg{
    position:fixed;
    inset:0;
    z-index:-3;
    width:100%;
    height:100%;
  }

  /* boot */
  #boot{
    position:fixed;
    inset:0;
    z-index:999999;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
  }

  #bootCard{
    width:min(760px,95vw);
    min-height:260px;
    border:1px solid rgba(0,255,136,.28);
    border-radius:22px;
    background:rgba(0,0,0,.88);
    box-shadow:0 0 35px rgba(0,255,136,.12);
    padding:22px;
  }

  #bootTitle{
    color:var(--main);
    font-size:24px;
    font-weight:900;
    letter-spacing:2px;
    margin-bottom:14px;
    text-shadow:0 0 12px rgba(0,255,136,.35);
  }

  #terminal{
    min-height:150px;
    white-space:pre-wrap;
    color:#caffdf;
    line-height:1.55;
    font-family:Consolas, monospace;
    font-size:13px;
  }

  #barWrap{
    width:100%;
    height:12px;
    border:1px solid rgba(0,255,136,.35);
    background:#06140d;
    border-radius:999px;
    overflow:hidden;
    margin-top:18px;
  }

  #bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,var(--main),var(--main2));
    box-shadow:0 0 15px rgba(0,255,136,.45);
  }

  /* top */
  #top{
    position:fixed;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    width:min(1320px, calc(100vw - 28px));
    display:grid;
    grid-template-columns:1fr minmax(260px,520px) auto;
    gap:12px;
    align-items:center;
    padding:14px 16px;
    border-radius:22px;
    background:rgba(0,0,0,.50);
    border:1px solid rgba(0,255,136,.18);
    backdrop-filter:blur(12px);
    box-shadow:0 0 24px rgba(0,255,136,.08);
    z-index:1100;
  }

  #titleWrap{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }

  #logoDot{
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--main);
    box-shadow:0 0 16px rgba(0,255,136,.65);
    animation:dotPulse 1.7s infinite;
  }

  @keyframes dotPulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.2)}
  }

  #title{
    color:var(--main);
    font-size:24px;
    font-weight:900;
    letter-spacing:2px;
    text-shadow:0 0 16px rgba(0,255,136,.22);
  }

  #subTitle{
    color:var(--muted);
    font-size:11px;
    letter-spacing:1px;
    margin-top:3px;
  }

  .searchWrap{
    position:relative;
  }

  #searchIcon{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:var(--main);
    pointer-events:none;
  }

  #search{
    width:100%;
    padding:13px 16px 13px 40px;
    border-radius:16px;
    background:rgba(0,0,0,.85);
    border:1px solid rgba(0,255,136,.22);
    outline:none;
    color:var(--text);
  }

  #search:focus{
    border-color:var(--main);
    box-shadow:0 0 16px rgba(0,255,136,.14);
  }

  #topRight{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .topBtn{
    min-width:42px;
    height:42px;
    border:none;
    border-radius:14px;
    color:var(--main);
    background:rgba(0,0,0,.85);
    border:1px solid rgba(0,255,136,.22);
    cursor:pointer;
    transition:.18s ease;
  }

  .topBtn:hover{
    transform:translateY(-1px);
    box-shadow:0 0 14px rgba(0,255,136,.16);
  }

  #clock{
    min-width:140px;
    padding:8px 12px;
    border-radius:14px;
    background:rgba(0,0,0,.85);
    border:1px solid rgba(0,255,136,.22);
    font-size:12px;
    line-height:1.35;
    text-align:right;
    color:#d8ffe9;
  }

  /* desktop icons */
  #desktopIcons{
    position:fixed;
    inset:86px 0 60px 0;
    z-index:700;
    pointer-events:none;
  }

  .icon{
    position:absolute;
    width:88px;
    text-align:center;
    padding:10px 6px;
    border-radius:16px;
    pointer-events:auto;
    cursor:pointer;
    user-select:none;
    transition:.15s ease;
  }

  .icon:hover{
    background:rgba(0,255,136,.06);
    transform:translateY(-2px);
  }

  .iconThumb{
    width:54px;
    height:54px;
    margin:0 auto 8px;
    border-radius:16px;
    display:grid;
    place-items:center;
    color:#041a11;
    font-size:24px;
    background:linear-gradient(180deg,#abffd5,var(--main));
    box-shadow:0 0 20px rgba(0,255,136,.18);
  }

  .iconLabel{
    color:#e6fff2;
    font-size:11px;
    line-height:1.25;
    text-shadow:0 0 12px rgba(0,0,0,.7);
  }

  /* main area */
  #mainArea{
    position:fixed;
    inset:92px 18px 68px 18px;
    z-index:800;
    overflow:auto;
    display:flex;
    justify-content:center;
    padding:14px 0 24px;
  }

  #mainWrap{
    width:min(1320px,100%);
  }

  #sectionBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:2px 2px 16px;
    gap:12px;
  }

  #sectionTitle{
    font-size:15px;
    color:#d9ffe9;
  }

  #sectionMeta{
    font-size:12px;
    color:#89d5ab;
  }

  #grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:22px;
  }

  .card{
    position:relative;
    height:290px;
    border-radius:22px;
    overflow:hidden;
    background:#000;
    cursor:pointer;
    transform-style:preserve-3d;
    transition:transform .28s ease, box-shadow .28s ease;
    border:1px solid rgba(0,255,136,.15);
  }

  .card:hover{
    transform:rotateY(5deg) rotateX(4deg) scale(1.04);
    box-shadow:
      0 18px 40px rgba(0,0,0,.48),
      0 0 34px rgba(0,255,136,.18);
  }

  .card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:transform .55s ease, filter .35s ease;
  }

  .card:hover img{
    transform:scale(1.14) translateY(-6px);
    filter:brightness(.55) contrast(1.08);
  }

  .card::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(180deg, transparent 20%, rgba(0,0,0,.2) 48%, rgba(0,0,0,.96) 100%);
    z-index:1;
  }

  .card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, transparent 35%, rgba(255,255,255,.09), transparent 66%);
    transform:translateX(-70%) rotate(8deg);
    transition:transform .65s ease;
    z-index:2;
  }

  .card:hover::after{
    transform:translateX(45%) rotate(8deg);
  }

  .cardContent{
    position:absolute;
    inset:auto 0 0 0;
    z-index:3;
    padding:16px;
  }

  .cardTopRow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
  }

  .badge{
    padding:5px 9px;
    border-radius:999px;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    background:rgba(0,0,0,.65);
    border:1px solid rgba(0,255,136,.2);
    color:#d8ffe9;
  }

  .playBadge{
    background:linear-gradient(180deg,#b8ffde,var(--main));
    color:#032116;
    border:none;
    font-weight:900;
  }

  .cardName{
    font-size:18px;
    font-weight:900;
    color:#fff;
    text-shadow:
      0 1px 0 #00ff88,
      0 2px 0 #00cc66,
      0 4px 10px rgba(0,255,136,.4),
      0 0 18px rgba(0,255,136,.35);
  }

  .cardMeta{
    margin-top:6px;
    display:flex;
    justify-content:space-between;
    gap:8px;
    font-size:11px;
    color:#8dd7ad;
  }

  /* player */
  #player{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    z-index:140000;
    opacity:0;
    transition:opacity .2s ease;
  }

  #player.active{
    display:block;
    opacity:1;
  }

  #frame{
    width:100%;
    height:100%;
    border:none;
    background:#000;
  }

  #playerBar{
    position:absolute;
    top:16px;
    right:16px;
    display:flex;
    gap:10px;
    z-index:5;
  }

  .playerBtn{
    min-width:46px;
    height:46px;
    padding:0 14px;
    border:none;
    cursor:pointer;
    border-radius:16px;
    color:#031c11;
    font-weight:800;
    background:linear-gradient(180deg,#abffd5,var(--main));
    box-shadow:0 0 18px rgba(0,255,136,.18);
  }

  .playerBtn.danger{
    background:linear-gradient(180deg,#ffb6c4,#ff4d6d);
    color:#2a000a;
  }

  /* random */
  #randomBtn{
    position:fixed;
    left:18px;
    bottom:70px;
    width:54px;
    height:54px;
    border:none;
    border-radius:18px;
    z-index:1200;
    cursor:pointer;
    background:linear-gradient(180deg,#abffd5,var(--main));
    color:#042116;
    font-size:20px;
    font-weight:900;
    box-shadow:0 0 22px rgba(0,255,136,.22);
  }

  /* taskbar */
  #taskbar{
    position:fixed;
    left:10px;
    right:10px;
    bottom:10px;
    height:46px;
    border-radius:18px;
    z-index:1250;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:0 10px;
    background:rgba(0,0,0,.74);
    border:1px solid rgba(0,255,136,.18);
    backdrop-filter:blur(12px);
  }

  #taskLeft{
    display:flex;
    align-items:center;
    gap:8px;
  }

  #startBtn{
    min-width:44px;
    height:34px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:linear-gradient(180deg,#a7ffd2,var(--main));
    color:#032116;
    font-weight:900;
  }

  #taskApps{
    display:flex;
    gap:8px;
    align-items:center;
  }

  .taskApp{
    min-width:36px;
    height:34px;
    padding:0 12px;
    border-radius:12px;
    border:1px solid rgba(0,255,136,.14);
    background:rgba(255,255,255,.04);
    color:#dfffee;
    cursor:pointer;
    font-size:12px;
  }

  #taskRight{
    display:flex;
    align-items:center;
    gap:10px;
  }

  #onlineBadge{
    padding:5px 9px;
    border-radius:999px;
    background:rgba(0,255,136,.11);
    color:var(--muted);
    font-size:11px;
  }

  #taskClock{
    font-size:12px;
    line-height:1.3;
    text-align:right;
    color:#deffec;
  }

  /* start menu */
  #startMenu{
    position:fixed;
    left:12px;
    bottom:64px;
    width:min(360px,calc(100vw - 24px));
    max-height:min(72vh,680px);
    display:none;
    flex-direction:column;
    overflow:hidden;
    z-index:1300;
    background:rgba(0,0,0,.88);
    border:1px solid rgba(0,255,136,.22);
    border-radius:22px;
    box-shadow:0 0 30px rgba(0,255,136,.1);
    backdrop-filter:blur(14px);
  }

  #startHead{
    padding:14px;
    border-bottom:1px solid rgba(0,255,136,.12);
  }

  #startSearch{
    width:100%;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid rgba(0,255,136,.18);
    background:rgba(0,0,0,.74);
    color:#eafff2;
    outline:none;
  }

  #startBody{
    display:grid;
    gap:10px;
    padding:12px;
    overflow:auto;
  }

  .startSectionTitle{
    font-size:11px;
    color:#87d6a9;
    margin:6px 2px 2px;
    text-transform:uppercase;
    letter-spacing:1px;
  }

  .startItem{
    width:100%;
    padding:12px;
    border:none;
    text-align:left;
    border-radius:14px;
    color:#e8fff2;
    background:rgba(255,255,255,.035);
    border:1px solid rgba(0,255,136,.10);
    cursor:pointer;
  }

  .startItem:hover{
    background:rgba(0,255,136,.08);
  }

  .startItem small{
    display:block;
    margin-top:4px;
    color:#90d8b0;
  }

  /* windows */
  #windowLayer{
    position:fixed;
    inset:0;
    z-index:1280;
    pointer-events:none;
  }

  .window{
    position:absolute;
    width:min(420px,calc(100vw - 24px));
    max-height:min(76vh,720px);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    border-radius:20px;
    background:rgba(0,0,0,.9);
    border:1px solid rgba(0,255,136,.18);
    box-shadow:0 14px 34px rgba(0,0,0,.42), 0 0 24px rgba(0,255,136,.08);
    pointer-events:auto;
  }

  .titleBar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:10px 12px;
    background:linear-gradient(180deg, rgba(0,255,136,.14), rgba(0,255,136,.05));
    border-bottom:1px solid rgba(0,255,136,.12);
    cursor:move;
    user-select:none;
  }

  .titleBarText{
    color:#ebfff5;
    font-size:13px;
    font-weight:700;
  }

  .titleBarActions{
    display:flex;
    gap:8px;
  }

  .winBtn{
    width:30px;
    height:28px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:rgba(255,255,255,.08);
    color:#ebfff5;
  }

  .winBody{
    overflow:auto;
    padding:14px;
    color:#e6fff1;
  }

  .winGrid{
    display:grid;
    gap:10px;
  }

  .winCard{
    padding:12px;
    border-radius:14px;
    border:1px solid rgba(0,255,136,.10);
    background:rgba(255,255,255,.03);
  }

  .rowBtns{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:8px;
  }

  .smallBtn{
    padding:10px 12px;
    border:none;
    cursor:pointer;
    border-radius:12px;
    color:#032116;
    background:linear-gradient(180deg,#b9ffdd,var(--main));
    font-weight:800;
  }

  .ghostBtn{
    padding:10px 12px;
    border:none;
    cursor:pointer;
    border-radius:12px;
    color:#dfffee;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(0,255,136,.14);
  }

  .settingItem{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px;
    border-radius:14px;
    border:1px solid rgba(0,255,136,.10);
    background:rgba(255,255,255,.03);
  }

  .switchBtn{
    min-width:88px;
    height:34px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    color:#032116;
    font-weight:800;
    background:linear-gradient(180deg,#baffdf,var(--main));
  }

  /* ai */
  #aiPanel{
    position:fixed;
    right:20px;
    bottom:80px;
    width:300px;
    height:380px;
    display:flex;
    flex-direction:column;
    background:rgba(0,0,0,.90);
    border:1px solid rgba(0,255,136,.26);
    border-radius:18px;
    box-shadow:0 0 25px rgba(0,255,136,.14);
    z-index:1500;
    animation:aiPulse 3s infinite;
  }

  @keyframes aiPulse{
    0%,100%{box-shadow:0 0 20px rgba(0,255,136,.16)}
    50%{box-shadow:0 0 34px rgba(0,255,136,.28)}
  }

  #aiHeader{
    padding:10px 12px;
    font-weight:900;
    color:var(--main);
    border-bottom:1px solid rgba(0,255,136,.16);
    letter-spacing:1px;
  }

  #aiChat{
    flex:1;
    overflow:auto;
    padding:10px;
    font-size:13px;
    color:#caffdf;
  }

  .aiMsg{
    margin-bottom:8px;
    line-height:1.4;
  }

  #aiInput{
    border:none;
    border-top:1px solid rgba(0,255,136,.12);
    padding:10px;
    background:#000;
    color:#00ff88;
    outline:none;
  }

  /* idle */
  #idleBox{
    position:fixed;
    bottom:470px;
    right:20px;
    width:280px;
    padding:14px;
    border-radius:16px;
    background:rgba(0,0,0,.88);
    border:1px solid rgba(0,255,136,.24);
    box-shadow:0 0 20px rgba(0,255,136,.12);
    display:none;
    z-index:1500;
    animation:idlePop .3s ease;
  }

  @keyframes idlePop{
    from{transform:translateY(16px);opacity:0}
    to{transform:translateY(0);opacity:1}
  }

  #idleCharacter{
    font-size:30px;
    margin-bottom:8px;
  }

  #idleText{
    color:#d7ffea;
    font-size:13px;
    line-height:1.4;
  }

  /* cursor */
  #cursor{
    position:fixed;
    width:22px;
    height:22px;
    border:2px solid #00ff88;
    border-radius:50%;
    pointer-events:none;
    z-index:200000;
    transform:translate(-50%,-50%);
    box-shadow:
      0 0 20px rgba(0,255,136,.8),
      inset 0 0 10px rgba(0,255,136,.4);
    transition:width .12s ease,height .12s ease,opacity .2s ease;
  }

  #cursorDot{
    position:fixed;
    width:5px;
    height:5px;
    border-radius:50%;
    background:#00ff88;
    pointer-events:none;
    z-index:200001;
    transform:translate(-50%,-50%);
    box-shadow:0 0 12px rgba(0,255,136,.8);
  }

  .cursor-hover{
    width:30px !important;
    height:30px !important;
  }

  .cursor-click{
    width:34px !important;
    height:34px !important;
    opacity:.85;
  }

  .trail{
    position:fixed;
    width:7px;
    height:7px;
    border-radius:50%;
    pointer-events:none;
    z-index:199999;
    box-shadow:0 0 14px rgba(0,255,136,.45);
    animation:trailFade .34s forwards;
  }

  @keyframes trailFade{
    to{
      transform:scale(.1);
      opacity:0;
    }
  }

  .glitch{
    filter:hue-rotate(90deg) contrast(1.8);
  }

  /* fight */
  #fightScene{
    position:fixed;
    inset:0;
    z-index:160000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:
      radial-gradient(circle at center, rgba(0,255,136,.12), transparent 35%),
      linear-gradient(180deg,#000,#040404 55%,#000);
    overflow:hidden;
  }

  #fightNames{
    position:relative;
    z-index:2;
    font-size:28px;
    color:var(--main);
    text-shadow:0 0 18px rgba(0,255,136,.55);
    margin-bottom:18px;
    text-align:center;
    padding:0 16px;
  }

  #fightBars{
    position:relative;
    z-index:2;
    width:min(900px,88vw);
    display:flex;
    gap:22px;
    margin-bottom:30px;
  }

  .bar{
    flex:1;
    height:18px;
    border-radius:999px;
    overflow:hidden;
    background:#0d0d0d;
    border:1px solid rgba(0,255,136,.22);
  }

  .barFill{
    width:100%;
    height:100%;
    background:linear-gradient(90deg,var(--main),#c8ffe3);

function beep(freq=440, duration=0.05, type="sine", volume=0.03, delay=0){
  const startAt = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(startAt);
  gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
  osc.stop(startAt + duration);
}

      x:Math.random()*bgCanvas.width,
      y:Math.random()*bgCanvas.height,
      vx:(Math.random()-.5)*.34,
      vy:(Math.random()-.5)*.34,
      size:Math.random()*1.8+.8
    });
  }
}

function drawBg(){
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);

  for(const d of dots){

    d.y += d.vy;
    if(d.x < 0 || d.x > bgCanvas.width) d.vx *= -1;
    if(d.y < 0 || d.y > bgCanvas.height) d.vy *= -1;
    bgCtx.fillRect(d.x, d.y, d.size, d.size);
  }

  requestAnimationFrame(drawBg);
}

  startBody.appendChild(gameSection);

  games
    .filter(g => !q || g.name.toLowerCase().includes(q) || g.category.toLowerCase().includes(q))
    .forEach(g=>{
      const b = document.createElement("button");
      b.className = "startItem";
      b.innerHTML = `${g.name}<small>${g.category}</small>`;
      b.addEventListener("click", ()=>{
        openGame(g.file, g.name);
        startMenu.style.display = "none";
      });
      startBody.appendChild(b);
    });

  attachHoverCursor(startBody);
}
renderStartMenu();

/* =========================
   WINDOWS
========================= */
function focusWindow(win){
  taskZ++;
  win.style.zIndex = taskZ;
}

function makeWindowDraggable(win, bar){
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  bar.addEventListener("mousedown", e=>{
    dragging = true;
    focusWindow(win);
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
  });

  document.addEventListener("mousemove", e=>{
    if(!dragging) return;
    win.style.left = clamp(e.clientX - offsetX, 8, window.innerWidth - win.offsetWidth - 8) + "px";
    win.style.top = clamp(e.clientY - offsetY, 8, window.innerHeight - win.offsetHeight - 64) + "px";
  });

  document.addEventListener("mouseup", ()=>{
    dragging = false;
  });
}

function openWindow(title, html){
  const win = document.createElement("div");
  win.className = "window";
  win.style.left = Math.round(90 + Math.random()*120) + "px";
  win.style.top = Math.round(110 + Math.random()*80) + "px";
  win.style.zIndex = ++taskZ;

  win.innerHTML = `
    <div class="titleBar">
      <div class="titleBarText">${title}</div>
      <div class="titleBarActions">
        <button class="winBtn" data-min>—</button>
        <button class="winBtn" data-close>✕</button>
      </div>
    </div>
    <div class="winBody">${html}</div>
  `;

  windowLayer.appendChild(win);

  const titleBar = win.querySelector(".titleBar");
  const btnClose = win.querySelector("[data-close]");
  const btnMin = win.querySelector("[data-min]");

  makeWindowDraggable(win, titleBar);

  btnClose.addEventListener("click", ()=>win.remove());

  btnMin.addEventListener("click", ()=>{
    win.style.display = "none";
    const task = addTaskApp(title, ()=>{
      win.style.display = "flex";
      focusWindow(win);
      task.remove();
    });
  });

  win.addEventListener("mousedown", ()=>focusWindow(win));
  attachHoverCursor(win);
  return win;
}

function openProfile(){
  openWindow("Profile", `
    <div class="winGrid">
      <div class="winCard">
        <b>User</b><br>${username}
        <div class="rowBtns">
          <button class="smallBtn" onclick="changeUser()">Change Name</button>
        </div>
      </div>
      <div class="winCard">
        <b>Library</b><br>${games.length} manual games loaded
      </div>
      <div class="winCard">
        <b>Mode</b><br>No code injection into games
      </div>
    </div>
  `);
}

function openSettings(){
  const win = openWindow("Settings", `
    <div class="winGrid">
      <div class="settingItem">
        <label>AI Mode</label>
        <button class="switchBtn" id="modeBtn">${aiMode.toUpperCase()}</button>
      </div>
      <div class="winCard">
        <b>Wallpapers</b>
        <div class="rowBtns">
          <button class="ghostBtn" data-wall="0">Wall 1</button>
          <button class="ghostBtn" data-wall="1">Wall 2</button>
          <button class="ghostBtn" data-wall="2">Wall 3</button>
        </div>
      </div>
      <div class="winCard">
        <b>Quick Keys</b><br>
        G = random game<br>
        U = change username<br>
        S = open settings<br>
        Esc = close game
      </div>
    </div>
  `);

  const bodyEl = win.querySelector(".winBody");
  const modeBtn = bodyEl.querySelector("#modeBtn");

  modeBtn.addEventListener("click", ()=>{
    const modes = ["normal","helper","toxic"];
    aiMode = modes[(modes.indexOf(aiMode)+1) % modes.length];
    modeBtn.textContent = aiMode.toUpperCase();
    aiSay("mode changed to " + aiMode);
  });

  bodyEl.querySelectorAll("[data-wall]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      setWallpaper(wallpapers[Number(btn.dataset.wall)]);
    });
  });
}
settingsBtnTop.addEventListener("click", openSettings);

/* =========================
   ICONS
========================= */
function makeDraggableIcon(el){
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener("mousedown", e=>{
    dragging = true;
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;
  });

  document.addEventListener("mousemove", e=>{
    if(!dragging) return;
    el.style.left = clamp(e.clientX - offsetX, 6, window.innerWidth - el.offsetWidth - 6) + "px";
    el.style.top = clamp(e.clientY - offsetY, 86, window.innerHeight - el.offsetHeight - 62) + "px";
  });

  document.addEventListener("mouseup", ()=>{
    dragging = false;
  });

  el.addEventListener("dblclick", ()=>{
    if(typeof el._openAction === "function") el._openAction();
  });
}

function addIcon(name, emoji, x, y, action){
  const d = document.createElement("div");
  d.className = "icon";
  d.style.left = x + "px";
  d.style.top = y + "px";
  d.innerHTML = `
    <div class="iconThumb">${emoji}</div>
    <div class="iconLabel">${name}</div>
  `;
  d._openAction = action;
  d.addEventListener("click", soundUIClick);
  desktopIcons.appendChild(d);
  makeDraggableIcon(d);
}

addIcon("Games", "🎮", 18, 110, ()=>{});
addIcon("Settings", "⚙", 18, 210, openSettings);
addIcon("Profile", "👤", 18, 310, openProfile);
addIcon("Random", "🎲", 18, 410, randomGame);
attachHoverCursor(desktopIcons);

/* =========================
   AI
========================= */
function aiThink(){
  aiSay(aiRandomLines[Math.floor(Math.random()*aiRandomLines.length)]);
}

function aiReact(event){
  if(event === "idle"){
    aiSay("you stopped moving...");
    return;
  }
  if(event === "game"){
    aiSay("finally doing something.");
    return;
  }
  if(event === "close"){
    aiSay("already leaving?");
    return;
  }
  if(event === "spam"){
    aiSay("you clicking too fast.");
  }
}

function aiReply(input){
  input = input.toLowerCase();

  if(input === "toxic mode"){
    aiMode = "toxic";
    aiSay("toxic mode enabled.");
    return;
  }

  if(input === "helper mode"){
    aiMode = "helper";
    aiSay("helper mode enabled.");
    return;
  }

  if(input === "normal mode"){
    aiMode = "normal";
    aiSay("normal mode.");
    return;
  }

  if(input.includes("play sonic")){
    openGame("sonic.html","Sonic");
    aiSay("sonic launched.");
    return;
  }

  if(input.includes("play mk")){
    openGame("mk1.html","MK1");
    aiSay("mk launched.");
    return;
  }

  if(input.includes("play")){
    aiSay("launching...");
    randomGame();
    return;
  }

  if(input.includes("close game")){
    closeGame();
    aiSay("closing...");
    return;
  }

  if(input.includes("settings")){
    openSettings();
    aiSay("opening settings...");
    return;
  }

  if(input.includes("search")){
    const word = input.replace("search","").trim();
    search.value = word;
    filterGames(word);
    aiSay("searching " + word);
    return;
  }

  if(input === "god mode"){
    aiSay("system unlocked.");
    body.style.transform = "scale(1.02)";
    return;
  }

  if(input === "glitch"){
    aiSay("injecting glitch...");
    body.classList.add("glitch");
    setTimeout(()=>body.classList.remove("glitch"), 1000);
    return;
  }

  if(input === "help"){
    aiSay("commands: play, play sonic, play mk, search, settings, close game, helper mode, toxic mode, normal mode, glitch");
    return;
  }

  if(aiMode === "toxic"){
    const toxic = [
      "that was dumb.",
      "you serious?",
      "do something useful.",
      "this is why you lose.",
      "you just typing random stuff now."
    ];
    aiSay(toxic[Math.floor(Math.random()*toxic.length)]);
    return;
  }

  if(aiMode === "helper"){
    const helper = [
      "try typing 'play' to start a game.",
      "you can search for games.",
      "use random for a quick pick.",
      "open settings to customize."
    ];
    aiSay(helper[Math.floor(Math.random()*helper.length)]);
    return;
  }

  const normal = [
    "unknown command.",
    "try again.",
    "does nothing.",
    "invalid input."
  ];
  aiSay(normal[Math.floor(Math.random()*normal.length)]);
}

aiInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    const val = aiInput.value.trim();
    if(!val) return;
    aiSay(val);
    aiReply(val);
    aiInput.value = "";
  }
});

setInterval(()=>{
  if(Math.random() > 0.6){
    aiThink();
  }
},10000);

/* spam detect */
let clickCount = 0;
document.addEventListener("click", ()=>{
  clickCount++;
  if(clickCount > 10){
    aiReact("spam");
    clickCount = 0;
  }
  setTimeout(()=>clickCount = 0, 2000);
});

/* =========================
   IDLE
========================= */
function resetIdle(){
  idleTime = 0;
  idleBox.style.display = "none";
}

["mousemove","click","keydown"].forEach(e=>{
  document.addEventListener(e, resetIdle);
});

setInterval(()=>{
  idleTime++;

  if(idleTime === 5){
    idleBox.style.display = "block";
    idleCharacter.textContent = ["🤖","😈","👾","🧠","💀"][Math.floor(Math.random()*5)];
    idleText.textContent = aiIdleMessages[Math.floor(Math.random()*aiIdleMessages.length)];
    aiReact("idle");
  }

  if(idleTime === 10){
    idleText.textContent = "still nothing??? 💀";
  }

  if(idleTime === 15){
    idleText.textContent = "ok now you're just wasting time";
  }

  if(idleTime === 20){
    idleText.textContent = "fine. launching something for you.";
    randomGame();
    resetIdle();
  }
},1000);

/* =========================
   FIGHT
========================= */
function setFightBars(){
  hp1Bar.style.width = clamp(hp1,0,100) + "%";
  hp2Bar.style.width = clamp(hp2,0,100) + "%";
}

function dashAttack(attacker){
  if(attacker === 1){
    fighter1.classList.add("dash");
  }else{
    fighter2.classList.add("dash");
  }

  setTimeout(()=>{
    fighter1.classList.remove("dash");
    fighter2.classList.remove("dash");
  }, 130);
}

function animateHit(attacker){
  if(attacker === 1){
    fighter1.classList.add("attack");
  }else{
    fighter2.classList.add("attack");
  }

  setTimeout(()=>{
    fighter1.classList.remove("attack");
    fighter2.classList.remove("attack");
  }, 110);
}

function markHit(target){
  target.classList.add("hit");
  setTimeout(()=>target.classList.remove("hit"), 100);
}

function markBlock(target){
  target.classList.add("block");
  setTimeout(()=>target.classList.remove("block"), 100);
}

function markClash(){
  fighter1.classList.add("clash");
  fighter2.classList.add("clash");
  setTimeout(()=>{
    fighter1.classList.remove("clash");
    fighter2.classList.remove("clash");
  }, 110);
}

function doFightAction(){
  if(hp2 <= 18 && Math.random() < 0.25){
    doUltimateMove();
    return;
  }

  const roll = Math.random();

  if(roll < 0.55){
    const attacker = Math.random() > 0.35 ? 1 : 2;
    const base = Math.floor(Math.random()*6)+6;

    if(attacker === 1){
      combo1++;
      combo2 = 0;
      const dmg = base + combo1;
      hp2 -= dmg;
      animateAttack(1, dmg, combo1);
    } else {
      combo2++;
      combo1 = 0;
      const dmg = base + combo2;
      hp1 -= dmg;
      animateAttack(2, dmg, combo2);
    }
  } else if(roll < 0.8){
    animateBlock();
  } else {
    animateClash();
  }

  setFightBars();
  checkFightEnd();
}

function animateAttack(attacker, dmg, combo){
  const isYou = attacker === 1;
  const target = isYou ? fighter2 : fighter1;

  soundWhoosh();
  dashAttack(attacker);
  animateHit(attacker);

  setTimeout(()=>{
    target.classList.add("hit");
    if(isYou){
      soundHitA();
    } else {
      soundHitB();
    }

    fightText.textContent = combo >= 3 ? `COMBO x${combo} // ${dmg}` : `${dmg} DAMAGE`;

    if(combo >= 3){
      showDialog(isYou ? "SYSTEM BREACH IN PROGRESS" : "ACCESS DENIED");
    } else {
      showDialog(isYou ? "KEEP GOING..." : "TRY AGAIN");
    }

    setTimeout(()=>{
      fighter1.classList.remove("hit");
      fighter2.classList.remove("hit");
    }, 120);
  }, 80);
}

function animateBlock(){
  const defender = Math.random() > 0.5 ? fighter1 : fighter2;
  markBlock(defender);
  soundBlock();
  fightText.textContent = "BLOCKED";
  showDialog("DEFENSE ACTIVE");
}

function animateClash(){
  markClash();
  soundClash();
  fightText.textContent = "CLASH ⚡";
  showDialog("POWER STRUGGLE...");
}

function doUltimateMove(){
  const move = ultimateMoves[Math.floor(Math.random()*ultimateMoves.length)];
  currentFightLoop && clearInterval(currentFightLoop);

  fightText.textContent = "ULTIMATE READY";
  showDialog("FINAL SEQUENCE");

  setTimeout(()=>{
    fightText.textContent = move.text;
    showDialog(move.dialog, 1800);
    soundFinisher();

    fighter1.classList.add("dash");
    fighter2.classList.add("hit");

    setTimeout(()=>{
      fighter1.classList.remove("dash");
      fighter2.classList.remove("hit");
      hp2 = 0;
      setFightBars();
      checkFightEnd();
    }, 500);
  }, 400);
}

function checkFightEnd(){
  if(hp1 <= 0 || hp2 <= 0){
    currentFightLoop && clearInterval(currentFightLoop);

    hp1 = Math.max(hp1, 18);
    hp2 = 0;
    setFightBars();

    fightText.textContent = username + " WINS";
    showDialog("Access granted.", 1200);

    setTimeout(()=>{
      fightScene.style.opacity = "0";
      fightScene.style.transition = "opacity .45s ease";
      setTimeout(()=>{
        if(fightScene.parentNode) fightScene.remove();
      }, 460);
    }, 1200);
  }
}

function startFightIntro(){
  updateFightNames();
  setFightBars();
  fightText.textContent = "FIGHT START";

  setTimeout(()=>showDialog("you really thought this blocker would win?", 1200), 500);

  currentFightLoop = setInterval(()=>{
    doFightAction();
  }, 550);
}

/* =========================
   KEYS
========================= */
document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase() === "g") randomGame();
  if(e.key.toLowerCase() === "u") changeUser();
  if(e.key.toLowerCase() === "s") openSettings();
  if(e.key === "Escape" && player.classList.contains("active")) closeGame();
});

/* =========================
   INIT
========================= */
setWallpaper(currentWallpaper);
updateFightNames();
setFightBars();
attachHoverCursor(document);
aiSay("system online.");
</script>
